<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세 - 행운당</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo">행운당</div>
            <ul class="nav-links">
                <li><a href="#" class="active">오늘의 운세</a></li>
                <li><a href="#">학업운</a></li>
                <li><a href="#">연애운</a></li>
                <li><a href="#">우정운</a></li>
                <li><a href="#">금전운</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section id="input-view" class="view-section active">
            <div class="hero-content">
                <div class="text-area">
                    <p class="greeting">좋은 하루의 시작, 작은 행운을 확인해 보세요 </p>
                    <h1>오늘의 운세 </h1>
                    
                    <div class="input-card">
                        <label for="birthdate" class="input-label">생년월일 입력</label>
                        <div class="input-wrapper">
                            <input type="date" id="birthdate" required>
                        </div>
                        <button id="check-btn">운세 확인하기 &rarr;</button>
                    </div>
                </div>
                <div class="image-area">
                    <img src="images/clover.png" alt="메인 네잎클로버" class="hero-img">
                </div>
            </div>
        </section>

        <section id="result-view" class="view-section hidden">
            <div class="result-header">
                <h2> 🍀 오늘의 운세 </h2>
            </div>
            
            <div class="result-card">
                <p class="card-label">오늘의 한 줄 운세</p>
                <div class="quote-box">
                    <span class="quote-mark left">“</span>
                    <p id="fortune-sentence">여기에 운세 문구가 출력됩니다.</p>
                    <span class="quote-mark right">”</span>
                </div>
                
                <hr class="divider">
                
                <div class="lucky-items-row">
                    <div class="lucky-item">
                        <div class="icon-circle">📍</div>
                        <div class="item-text">
                            <span class="item-label">행운의 장소</span>
                            <strong id="lucky-place">-</strong>
                        </div>
                    </div>
                    <div class="lucky-item">
                        <div class="icon-circle">🍀</div>
                        <div class="item-text">
                            <span class="item-label">행운의 아이템</span>
                            <strong id="lucky-item">-</strong>
                        </div>
                    </div>
                    <div class="lucky-item">
                        <div class="icon-circle">⭐</div>
                        <div class="item-text">
                            <span class="item-label">행운의 행동</span>
                            <strong id="lucky-action">-</strong>
                        </div>
                    </div>
                </div>
            </div>

            <div class="retry-wrapper">
                <button id="retry-btn" class="outline-btn">처음으로 돌아가기</button>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
